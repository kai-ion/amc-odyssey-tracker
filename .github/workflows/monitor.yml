name: Odyssey 70mm monitor

# Free, always-on ticket-drop watcher. Polls AMC, diffs against the committed
# state file, emails on new dates / reopened seats, then commits the new state.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub's min is 5; 10 is polite to AMC)
  workflow_dispatch:          # lets you trigger a run by hand from the Actions tab
    inputs:
      after:
        description: "Only alert on dates on/after (YYYY-MM-DD). Blank = all."
        required: false
        default: ""
      dry_run:
        description: "Dry run (no email, no state write)"
        type: boolean
        default: false

# Prevent overlapping runs (a slow scan shouldn't collide with the next cron tick)
concurrency:
  group: odyssey-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated state file
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements-monitor.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          MONITOR_AFTER: ${{ github.event.inputs.after }}
        run: |
          ARGS=""
          [ -n "$MONITOR_AFTER" ] && ARGS="$ARGS --after $MONITOR_AFTER"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python monitor.py $ARGS

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "odyssey-monitor"
          git config user.email "actions@github.com"
          git add data/monitor_state.json
          git commit -m "monitor: update state [skip ci]" || echo "no state change"
          git push || echo "nothing to push"
